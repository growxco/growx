<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0F1A13"/>
      <stop offset="100%" stop-color="#0A130E"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#3DB55A" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#3DB55A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#C49B40" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C49B40" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0" x2="1">
      <stop offset="0%" stop-color="#ECFAEE"/>
      <stop offset="55%" stop-color="#A8E0B8"/>
      <stop offset="100%" stop-color="#3DB55A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="1">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200"/>
    <path d="M80 0 V630 M200 0 V630 M320 0 V630 M440 0 V630 M560 0 V630 M680 0 V630 M800 0 V630 M920 0 V630 M1040 0 V630"/>
  </g>

  <!-- top hairline -->
  <rect x="0" y="0" width="1200" height="1" fill="#3DB55A" opacity="0.5"/>

  <!-- eyebrow chip -->
  <g transform="translate(80 110)">
    <rect width="380" height="36" rx="18" fill="#3DB55A" fill-opacity="0.10" stroke="#3DB55A" stroke-opacity="0.3"/>
    <circle cx="20" cy="18" r="3" fill="#A8E0B8"/>
    <text x="36" y="23" font-family="Geist Mono, monospace" font-size="13" fill="#A8E0B8" letter-spacing="2">
      INTELIGÊNCIA OPERACIONAL · AGRO BR
    </text>
  </g>

  <!-- headline -->
  <text x="80" y="240" font-family="Sora, system-ui" font-size="80" font-weight="800" fill="#ECFAEE" letter-spacing="-2">Campo, indústria</text>
  <text x="80" y="330" font-family="Sora, system-ui" font-size="80" font-weight="800" fill="#ECFAEE" letter-spacing="-2">e dados</text>
  <text x="404" y="330" font-family="Sora, system-ui" font-size="80" font-weight="800" fill="url(#text-grad)" letter-spacing="-2">no mesmo</text>
  <text x="80" y="420" font-family="Sora, system-ui" font-size="80" font-weight="800" fill="url(#text-grad)" letter-spacing="-2">sistema.</text>

  <!-- subheadline -->
  <text x="80" y="478" font-family="Geist, system-ui" font-size="22" fill="#9CB8A2" letter-spacing="-0.4">
    Stack agro brasileira: hardware, software e dados conectados
  </text>
  <text x="80" y="510" font-family="Geist, system-ui" font-size="22" fill="#9CB8A2" letter-spacing="-0.4">
    de ponta a ponta. Operando 24/7 onde a tecnologia importada não chega.
  </text>

  <!-- bottom row -->
  <g transform="translate(80 568)">
    <text x="0" y="0" font-family="Sora, system-ui" font-size="26" font-weight="700" fill="#ECFAEE">
      Grow-X
    </text>
    <rect x="100" y="-20" width="1" height="28" fill="#FFFFFF" opacity="0.15"/>
    <text x="118" y="0" font-family="Geist Mono, monospace" font-size="14" fill="#9CB8A2" letter-spacing="2">
      WWW.GROWX.COM.BR · CURITIBA/PR
    </text>
  </g>

  <!-- live dot -->
  <g transform="translate(1080 568)">
    <circle cx="0" cy="-7" r="6" fill="#3DB55A" opacity="0.3"/>
    <circle cx="0" cy="-7" r="3" fill="#A8E0B8"/>
    <text x="14" y="0" font-family="Geist Mono, monospace" font-size="14" fill="#A8E0B8" letter-spacing="2" font-weight="600">LIVE</text>
  </g>

  <!-- bottom hairline -->
  <rect x="0" y="629" width="1200" height="1" fill="#3DB55A" opacity="0.5"/>
</svg>
